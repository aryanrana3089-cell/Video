<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Surprise Page</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fdfdfd url('your-background.png') no-repeat center center;
      background-size: cover;
      overflow-x: hidden;
    }

    #content {
      transition: opacity 2s ease;
      position: relative;
      z-index: 100;
    }

    h1 {
      text-align: center;
      margin: 30px auto;
      padding: 15px 25px;
      background: rgba(255,255,255,0.9);
      border-radius: 12px;
      font-family: Georgia, serif;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
      max-width: 800px;
    }

    .video-container {
      display: flex;
      justify-content: center;
      margin: 20px 0;
    }
    .video-container video {
      width: 640px;
      height: 360px;
      border: 5px solid #fff;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      cursor: pointer;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
    }
    .modal.show { display: flex; }
    .modal video {
      max-width: 90%;
      max-height: 80%;
      border: 5px solid #fff;
      box-shadow: 0 0 20px rgba(0,0,0,0.7);
    }
    .close {
      position: absolute;
      top: 20px; right: 40px;
      font-size: 40px;
      color: #fff;
      cursor: pointer;
    }

    .bye-section {
      text-align: center;
      margin: 40px 0;
    }
    #byeButton {
      background: #8ecae6;
      color: #fff;
      font-size: 1.5rem;
      padding: 15px 40px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
      transition: transform 0.3s ease;
    }
    #byeButton:hover { transform: scale(1.05); }

    .letter-icon {
      position: fixed;
      bottom: 20px; right: 20px;
      font-size: 3.5rem;
      cursor: pointer;
      animation: bounceGlow 2s infinite;
      z-index: 600;
    }
    @keyframes bounceGlow {
      0%, 100% { transform: scale(1); text-shadow: 0 0 10px #ff4d6d; }
      50% { transform: scale(1.2); text-shadow: 0 0 20px #ff4d6d; }
    }

    .love-letter {
      position: fixed;
      bottom: 70px; right: 20px;
      background: rgba(255,255,255,0.95);
      padding: 20px;
      border-radius: 12px;
      width: 300px;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
      font-family: Georgia, serif;
      font-size: 1rem;
      color: #0a2a5e;
      line-height: 1.5;
      transform: scaleY(0);
      transform-origin: bottom;
      transition: transform 0.8s ease;
      overflow: hidden;
      z-index: 500;
    }
    .love-letter.show { transform: scaleY(1); }

    /* Decorations with new sizes and tilts */
    .deco { position: absolute; z-index: 400; }

    .star {
      top: 20px;
      left: 40px; /* moved ~1cm right */
      width: 140px; /* larger */
    }

    .moon {
      top: 20px;
      right: 20px;
      width: 140px; /* larger */
    }

    .note {
      bottom: 100px;
      left: 50px;
      width: 150px; /* increased more */
      transform: rotate(-10deg); /* tilt left */
    }

    .camera {
      bottom: 150px;
      right: 50px;
      width: 150px; /* increased more */
      transform: rotate(10deg); /* tilt right */
    }

    #byeImage {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #fff url('bye.png') no-repeat center center;
      background-size: contain;
      opacity: 0;
      transition: opacity 2s ease;
      z-index: 2000;
    }
    #byeImage.show {
      display: block;
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="content">
    <h1>Here's a surprise from my side to my favourite person</h1>

    <div class="video-container">
      <video id="previewVideo" muted autoplay loop>
        <source src="your-video.mp4" type="video/mp4" />
      </video>
    </div>

    <div id="videoModal" class="modal">
      <span class="close" id="closeModal">&times;</span>
      <video id="fullVideo" controls>
        <source src="your-video.mp4" type="video/mp4" />
      </video>
    </div>

    <div class="bye-section">
      <button id="byeButton">Byeeeeeeeeeee</button>
    </div>

    <div class="letter-icon" id="letterIcon">💌</div>
    <div class="love-letter" id="loveLetter">
      💌 Yawiii, I love u ❤️ and I will keep loving u no matter what...  
      🎂 I wish u a veryyy happy birthday 🥳🎉✨
    </div>

    <!-- Decorations with new positions and sizes -->
    <img src="star.png" class="deco star">
    <img src="moon.png" class="deco moon">
    <img src="note.png" class="deco note">
    <img src="camera.png" class="deco camera">
  </div>

  <div id="byeImage"></div>

  <script>
    const letterIcon = document.getElementById('letterIcon');
    const loveLetter = document.getElementById('loveLetter');
    letterIcon.addEventListener('click', () => {
      loveLetter.classList.toggle('show');
    });

    const byeButton = document.getElementById('byeButton');
    const content = document.getElementById('content');
    const byeImage = document.getElementById('byeImage');
    byeButton.addEventListener('click', () => {
      content.style.opacity = '0';
      setTimeout(() => {
        content.style.display = 'none';
        byeImage.classList.add('show');
      }, 2000);
    });

    const previewVideo = document.getElementById('previewVideo');
    const modal = document.getElementById('videoModal');
    const closeModal = document.getElementById('closeModal');
    const fullVideo = document.getElementById('fullVideo');

    previewVideo.addEventListener('click', () => {
      modal.classList.add('show');
      fullVideo.muted = false;
      fullVideo.play();
    });

    closeModal.addEventListener('click', () => {
      modal.classList.remove('show');
      fullVideo.pause();
      fullVideo.currentTime = 0;
    });

    window.addEventListener('click', (event) => {
      if (event.target === modal) {
        modal.classList.remove('show');
        fullVideo.pause();
        fullVideo.currentTime = 0;
      }
    });
  </script>
</body>
</html>
